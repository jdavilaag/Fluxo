<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title-box">
        <div class="page-title-right">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="javascript: void(0);">Fluxo Shop</a></li>
            <li class="breadcrumb-item"><a href="javascript: void(0);">Informes</a></li>
            <li class="breadcrumb-item active">Kardex</li>
          </ol>
        </div>
        <h4 class="page-title">Kardex de Movimientos</h4>
      </div>
    </div>
  </div>

  <div id="mensaje-alerta" style="position: fixed; top: 150px; right: 30px; z-index: 9999; min-width: 300px;"></div>

  <!-- Filtros -->
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Filtrar por Producto</label>
              <select class="form-select" id="filtro-producto-kardex">
                <option value="">Todos los productos</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Tipo Movimiento</label>
              <select class="form-select" id="filtro-tipo-kardex">
                <option value="">Todos</option>
                <option value="ingreso">Ingreso</option>
                <option value="salida">Salida</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha Desde</label>
              <input class="form-control" type="date" id="filtro-fecha-desde"/>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha Hasta</label>
              <input class="form-control" type="date" id="filtro-fecha-hasta"/>
            </div>
            <div class="col-md-1 d-flex align-items-end">
              <button class="btn btn-primary w-100" id="btn-filtrar-kardex">
                <i class="ri-search-line"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body p-0">
          <div class="p-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
              <h5 class="header-title mb-0"><i class="ri-file-list-3-line me-1"></i> Movimientos de Stock</h5>
              <p class="text-muted mb-0 fs-13">Total: <span id="total-kardex">0</span> movimientos</p>
            </div>
            <div class="d-flex gap-2">
              <div class="input-group input-group-sm" style="width: 220px">
                <span class="input-group-text"><i class="ri-search-line"></i></span>
                <input type="text" class="form-control" id="buscador-kardex" placeholder="Buscar..."/>
              </div>
              <button class="btn btn-sm btn-success" onclick="cargarKardex()">
                <i class="ri-refresh-line"></i>
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-nowrap table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Producto</th>
                  <th>Tipo</th>
                  <th>Cantidad</th>
                  <th>Stock Anterior</th>
                  <th>Stock Posterior</th>
                  <th>Observación</th>
                  <th>Usuario</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="tabla-kardex">
                <tr>
                  <td colspan="9" class="text-center py-4 text-muted">
                    <i class="ri-loader-4-line me-1"></i> Cargando movimientos...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="p-3 d-flex justify-content-between align-items-center">
            <small class="text-muted" id="info-paginacion-kardex">Mostrando 0 de 0</small>
            <div class="d-flex gap-1" id="controles-paginacion-kardex"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  if (typeof cargarKardex === "undefined") {
      var s = document.createElement("script");
      s.src = "/assets/js/kardex.js?t=" + Date.now();
      document.body.appendChild(s);
  } else {
      cargarKardex();
  }
  </script>
</div>
