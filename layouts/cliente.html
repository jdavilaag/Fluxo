<div class="container-fluid">
  <!-- start page title -->
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-flex justify-content-between align-items-center">
        <h4 class="page-title">Gestión de Clientes</h4>
        <button class="btn btn-primary fw-semibold" id="btn-nuevo-cliente">
          <i class="ri-user-heart-line me-1"></i> Nuevo Cliente
        </button>
      </div>
    </div>
  </div>
  <!-- end page title -->

  <!-- Modal Registro/Edición de Cliente -->
  <div class="modal fade" id="modalCliente" tabindex="-1" aria-labelledby="modalClienteLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalClienteLabel">Registrar Nuevo Cliente</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="mensaje-alerta" style="position: fixed; top: 150px; right: 30px; z-index: 9999; min-width: 300px;"></div>
          <div class="row g-3">
            <div class="col-md-3">
              <label for="cli_documento" class="form-label">Documento <span class="text-danger">*</span></label>
              <input class="form-control" type="text" id="cli_documento" placeholder="DNI o RUC" maxlength="11" autocomplete="off"/>
            </div>
            <div class="col-md-5">
              <label for="cli_nombres" class="form-label">Nombres <span class="text-danger">*</span></label>
              <input class="form-control" type="text" id="cli_nombres" placeholder="Ingrese nombres completos" autocomplete="off"/>
            </div>
            <div class="col-md-2">
              <label for="cli_telefono" class="form-label">Teléfono</label>
              <input class="form-control" type="text" id="cli_telefono" placeholder="Ingrese teléfono" autocomplete="off"/>
            </div>
            <div class="col-md-2">
              <label for="cli_estado" class="form-label">Estado</label>
              <select class="form-select" id="cli_estado">
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
              </select>
            </div>
            <div class="col-md-5">
              <label for="cli_email" class="form-label">Email</label>
              <input class="form-control" type="email" id="cli_email" placeholder="Ingrese email" autocomplete="off"/>
            </div>
            <div class="col-md-7">
              <label for="cli_direccion" class="form-label">Dirección</label>
              <input class="form-control" type="text" id="cli_direccion" placeholder="Ingrese dirección" autocomplete="off"/>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-light fw-semibold px-4" type="button" id="btn-limpiar-cli">
            <i class="ri-refresh-line me-1"></i> Limpiar
          </button>
          <button class="btn btn-primary fw-semibold px-4" type="button" id="btn-registrar-cli">
            <i class="ri-save-line me-1"></i> Registrar Cliente
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body p-0">
          <div class="p-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
              <h5 class="header-title mb-0"><i class="ri-user-heart-line me-1"></i> Lista de Clientes</h5>
              <p class="text-muted mb-0 fs-13">Total: <span id="total-clientes">0</span> clientes registrados</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
              <div class="input-group input-group-sm" style="width: 220px">
                <span class="input-group-text"><i class="ri-search-line"></i></span>
                <input type="text" class="form-control" id="buscador-cli" placeholder="Buscar cliente..."/>
              </div>
              <select class="form-select form-select-sm" id="filtro-estado-cli" style="width: 130px">
                <option value="">Todos</option>
                <option value="1">Activos</option>
                <option value="0">Inactivos</option>
              </select>
              <button class="btn btn-sm btn-success" onclick="cargarClientes()">
                <i class="ri-refresh-line"></i>
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-nowrap table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width: 50px">#</th>
                  <th>Documento</th>
                  <th>Nombres</th>
                  <th>Teléfono</th>
                  <th>Email</th>
                  <th>Estado</th>
                  <th>Creado</th>
                  <th style="width: 100px" class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tabla-clientes">
                <tr>
                  <td colspan="8" class="text-center py-4 text-muted">
                    <i class="ri-loader-4-line me-1"></i> Cargando clientes...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="p-3 d-flex justify-content-between align-items-center">
            <small class="text-muted" id="info-paginacion-cli">Mostrando 0 de 0</small>
            <div class="d-flex gap-1" id="controles-paginacion-cli"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal eliminar -->
  <div class="modal fade" id="modalEliminarCli" tabindex="-1" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center p-4">
          <i class="ri-error-warning-line text-danger" style="font-size: 3rem"></i>
          <h5 class="mt-2 mb-1">¿Eliminar cliente?</h5>
          <p class="text-muted mb-3 fs-13">Esta acción no se puede deshacer.</p>
          <div class="d-flex gap-2 justify-content-center">
            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-danger px-4" id="btn-confirmar-eliminar-cli">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  if (typeof cargarClientes === "undefined") {
      var s = document.createElement("script");
      s.src = "/assets/js/cliente.js?t=" + Date.now();
      document.body.appendChild(s);
  } else {
      cargarClientes();
  }
  </script>
</div>
