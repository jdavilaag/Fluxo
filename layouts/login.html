<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Iniciar sesión | FLUXO SHOOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="A fully responsive admin theme which can be used to build CRM, CMS,ERP etc." name="description" />
    <meta content="Techzaa" name="author" />

    <!-- App favicon -->
    <link rel="shortcut icon" href="/assets/images/favicon.ico">

    <!-- Theme Config Js -->
    <script src="/assets/js/config.js"></script>

    <!-- App css -->
    <link href="/assets/css/app.min.css" rel="stylesheet" type="text/css" id="app-style" />

    <!-- Icons css -->
    <link href="/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="authentication-bg position-relative">
    <div class="account-pages pt-2 pt-sm-5 pb-4 pb-sm-5 position-relative">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-8 col-lg-10">
                    <div class="card overflow-hidden">
                        <div class="row g-0">
                            <div class="col-lg-6 d-none d-lg-block p-2">
                                <img src="/assets/images/auth-img.jpg" alt="" class="img-fluid rounded h-100">
                            </div>
                            <div class="col-lg-6">
                                <div class="d-flex flex-column h-100">
                                    <div class="auth-brand p-4">
                                        <a href="/login" class="logo-light">
                                            <img src="/assets/images/logo.png" alt="logo" height="22">
                                        </a>
                                        <a href="/login" class="logo-dark">
                                            <img src="/assets/images/logo-dark.png" alt="dark logo" height="22">
                                        </a>
                                    </div>
                                    <div class="p-4 my-auto">
                                        <h4 class="fs-20">Iniciar sesión</h4>
                                        <p class="text-muted mb-3">Introduce tu dirección de correo electrónico y
                                            contraseña para acceder a tu cuenta.
                                        </p>
                                        <!-- Alert placeholder -->
                                        <div id="login-alert" class="mb-3"></div>

                                        <!-- form -->
                                        <form id="login-form">
                                            <div class="mb-3">
                                                <label for="emailaddress" class="form-label">Dirección de correo
                                                    electrónico</label>
                                                <input class="form-control" type="email" id="emailaddress" required=""
                                                    placeholder="Ingresa tu correo electrónico">
                                            </div>
                                            <div class="mb-3">
                                                <a href="/login" class="text-muted float-end"><small>
                                                        ¿Olvidaste tu contraseña?</small></a>
                                                <label for="password" class="form-label">Contraseña</label>
                                                <input class="form-control" type="password" required="" id="password"
                                                    placeholder="Ingresa tu contraseña">
                                            </div>
                                            <div class="mb-3">
                                                <div class="form-check">
                                                    <input type="checkbox" class="form-check-input"
                                                        id="checkbox-signin">
                                                    <label class="form-check-label" for="checkbox-signin">Recordarme
                                                    </label>
                                                </div>
                                            </div>
                                            <div class="mb-0 text-start">
                                                <button class="btn btn-soft-primary w-100" type="submit"
                                                    id="btn-login"><i class="ri-login-circle-fill me-1"></i> <span
                                                        class="fw-bold">Iniciar
                                                        sesión</span> </button>

                                            </div>

                                            <div class="text-center mt-4">
                                                <p class="text-muted fs-16">Iniciar sesión con</p>
                                                <div class="d-flex gap-2 justify-content-center mt-3">
                                                    <a href="javascript: void(0);" class="btn btn-soft-primary"><i
                                                            class="ri-facebook-circle-fill"></i></a>
                                                    <a href="javascript: void(0);" class="btn btn-soft-danger"><i
                                                            class="ri-google-fill"></i></a>
                                                    <a href="javascript: void(0);" class="btn btn-soft-info"><i
                                                            class="ri-twitter-fill"></i></a>
                                                    <a href="javascript: void(0);" class="btn btn-soft-dark"><i
                                                            class="ri-github-fill"></i></a>
                                                </div>
                                            </div>
                                        </form>
                                        <!-- end form-->
                                    </div>
                                </div>
                            </div> <!-- end col -->
                        </div>
                    </div>
                </div>
                <!-- end row -->
            </div>
            <div class="row">
                <div class="col-12 text-center">
                    <p class="text-dark-emphasis"> ¿No tienes una cuenta?
                        <a href="../layouts/auth-register.html"
                            class="text-dark fw-bold ms-1 link-offset-3 text-decoration-underline"><b>Registrarse</b></a>
                    </p>
                </div> <!-- end col -->
            </div>
            <!-- end row -->
        </div>
        <!-- end container -->
    </div>
    <!-- end page -->

    <footer class="footer footer-alt fw-medium">
        <span class="text-dark">
            <script>document.write(new Date().getFullYear())</script> © Fluxo Shop - Diseñado por JR
        </span>
    </footer>
    <!-- Vendor js -->
    <script src="../assets/js/vendor.min.js"></script>

    <!-- App js -->
    <script src="../assets/js/app.min.js"></script>

    <script>
        console.log("Script login cargado");

        function mostrarAlerta(mensaje, tipo) {
            const alertDiv = document.getElementById("login-alert");
            if (alertDiv) {
                alertDiv.innerHTML = `
            <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                <i class="ri-error-warning-line me-1"></i> ${mensaje}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
            } else {
                alert(mensaje);
            }
        }

        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            console.log("Submit detectado");

            const email = document.getElementById("emailaddress").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) return;

            const btn = document.getElementById("btn-login");
            btn.disabled = true;

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                let data = {};
                try {
                    data = await res.json();
                } catch (errJson) {
                    console.error("Response is not JSON", errJson);
                }

                if (res.ok) {
                    window.location.href = "/";
                } else {
                    mostrarAlerta(data.detail || "Credenciales incorrectas.", "danger");
                    btn.disabled = false;
                }
            } catch (err) {
                console.log("Error:", err);
                mostrarAlerta("Error de conexión.", "danger");
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
