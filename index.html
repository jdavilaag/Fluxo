<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FLUXO SHOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      content="A fully responsive admin theme which can be used to build CRM, CMS,ERP etc."
      name="description"
    />
    <meta content="Techzaa" name="author" />

    <!-- App favicon -->
    <link rel="shortcut icon" href="assets/images/favicon.ico" />

    <!-- Daterangepicker css -->
    <link
      rel="stylesheet"
      href="assets/vendor/daterangepicker/daterangepicker.css"
    />

    <!-- Vector Map css -->
    <link
      rel="stylesheet"
      href="assets/vendor/admin-resources/jquery.vectormap/jquery-jvectormap-1.2.2.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Theme Config Js -->
    <script src="assets/js/config.js"></script>

    <!-- App css -->
    <link
      href="assets/css/app.min.css"
      rel="stylesheet"
      type="text/css"
      id="app-style"
    />

    <!-- Icons css 
        <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />-->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>

  <body>
    <!-- Begin page -->
    <div class="wrapper">
      <!-- ========== Topbar Start ========== -->
      {% include 'layouts/navbar.html' %}
      <!-- ========== Topbar End ========== -->

      <!-- ========== Left Sidebar Start ========== -->
      {% include 'layouts/sidebar.html' %}
      <!-- ========== Left Sidebar End ========== -->

      <!-- ============================================================== -->
      <!-- Start Page Content here -->
      <!-- ============================================================== -->
      <!-- start page title -->
      {% include 'layouts/star-page.html' %}
      <!-- end page title -->

      <div class="content-page">
        <div class="content" id="main-content" hx-ext="load-scripts">
          <!-- Start Content-->
          {% include 'layouts/dashboard.html' %}
          <!-- container -->
        </div>
        <!-- content -->
      </div>

      <!-- ============================================================== -->
      <!-- End Page content -->
      <!-- ============================================================== -->
    </div>
    <!-- END wrapper -->
    <!-- Footer Start -->
    {% include 'layouts/footer.html' %}
    <!-- end Footer -->
    <!-- Theme Settings -->
    {% include 'layouts/settings.html' %}

    <!-- Vendor js -->
    <script src="assets/js/vendor.min.js"></script>

    <!-- Daterangepicker js -->
    <script src="assets/vendor/daterangepicker/moment.min.js"></script>
    <script src="assets/vendor/daterangepicker/daterangepicker.js"></script>

    <!-- Apex Charts js -->
    <script src="assets/vendor/apexcharts/apexcharts.min.js"></script>

    <!-- Vector Map js -->
    <script src="assets/vendor/admin-resources/jquery.vectormap/jquery-jvectormap-1.2.2.min.js"></script>
    <script src="assets/vendor/admin-resources/jquery.vectormap/maps/jquery-jvectormap-world-mill-en.js"></script>

    <!-- Dashboard App js -->
    <script src="assets/js/pages/dashboard.js"></script>

    <!-- App js -->
    <script src="assets/js/app.min.js"></script>
    <script src="assets/js/htmx-handler.js"></script>
    <script src="assets/js/sesion.js"></script>
  </body>
</html>
